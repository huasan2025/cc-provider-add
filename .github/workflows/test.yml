name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Opt into Node.js 24 for JS actions (silences the v4 checkout deprecation
# warning until actions/checkout publishes a version that defaults to node24).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # macOS preinstalls zsh; ubuntu-latest does not. Install on Linux with
      # retries so a transient apt mirror outage (run 25238645428: 6-minute DNS
      # failure on azure.archive.ubuntu.com) doesn't fail the whole job.
      - name: Install zsh (Linux only)
        if: runner.os == 'Linux'
        run: |
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y zsh && exit 0
            echo "apt install failed (attempt $attempt), retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Verify zsh is available
        run: command -v zsh && zsh --version

      - name: Run skill test suite
        run: bash tests/run.sh
