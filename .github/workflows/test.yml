name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Opt into Node.js 24 for JS actions (silences the v4 checkout deprecation
# warning until actions/checkout publishes a version that defaults to node24).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # zsh is preinstalled on both ubuntu-latest and macos-latest runner
      # images. Verify and fail-fast with a clear message if that ever changes,
      # rather than depending on apt mirrors (which are flaky — see run
      # 25238645428 where azure.archive.ubuntu.com DNS-failed for 6 minutes).
      - name: Verify zsh is available
        run: command -v zsh && zsh --version

      - name: Run skill test suite
        run: bash tests/run.sh
